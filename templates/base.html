{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Viralate - ONG de Proteção Animal</title>
    <meta name="description" content="ONG Viralate - Transformando a vida de cães e gatos resgatados através de adoção responsável e lares temporários.">
    
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --verde-oliva: #A2B548;
            --azul-medio: #6699CC;
            --creme: #F2EAD3;
            --rosa-claro: #F5B7B1;
            --vermelho: #E3242B;
            --texto-escuro: #333333;
        }
        
        /* Smooth Scroll para navegação suave */
        html {
            scroll-behavior: smooth;
        }

        body { 
            background-color: var(--creme); 
            color: var(--texto-escuro);
            padding-top: 85px; /* Ajustado para casar com a nova altura da navbar */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .navbar-viralate { 
            background-color: var(--verde-oliva) !important;
            border-bottom: 4px solid var(--azul-medio); 
            padding-top: 0.5rem !important;   /* Diminui o respiro em cima */
            padding-bottom: 0.5rem !important; /* Diminui o respiro embaixo */
            min-height: 80px;                  /* Altura fixa controlada */
        }

        /* Garante que o logo não empurre a barra para baixo */
        .navbar-viralate .navbar-brand img {
            height: 60px; /* Reduzi de 70 para 60 para ficar mais discreto */
            width: auto;
        }

        .navbar-viralate .nav-link {
            color: white !important;
            opacity: 0.9;
            font-size: 1rem; /* Reduzi de 1.2 para 1.0 para não ocupar tanto espaço horizontal */
            transition: 0.3s;
        }

        .btn-doar-nav {
            background-color: var(--azul-medio); 
            color: white !important;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-doar-nav:hover {
            background-color: #5588bb;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Footer */
        .footer-viralate { 
            background-color: var(--verde-oliva); 
            color: white; 
        }

        .icone-social {
            transition: 0.3s;
            display: inline-block;
        }

        .icone-social:hover {
            color: var(--creme) !important;
            transform: scale(1.2);
        }

        /* Ajuste para imagens não estourarem o layout */
        img {
            max-width: 100%;
            height: auto;
        }
        
        @media (max-width: 768px) {
            body {
                padding-top: 75px; /* Um pouco menos de espaço no celular */
            }
            .navbar-viralate .navbar-brand img {
                height: 50px; /* Logo um pouco menor no celular para sobrar tela */
            }
        .border-success {
            border-color: var(--verde-oliva) !important;
        }
        
        @media (max-width: 768px) {
            .btn-viralate-outline {
                width: 100%; /* No celular, o botão de adoção fica gigante e fácil de clicar */
            }
        }
}
    </style>
</head>
<body>

    {% include 'includes/navbar.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
